<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Join the Wheel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap');
  :root {
    --bg:#0a0a0f; --panel:#10101a; --border:#1e1e30;
    --text:#e8e8f0; --muted:#5a5a80;
    --accent:#00ffcc; --accent2:#ff3cac;
    --glow:0 0 20px rgba(0,255,204,.35);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px)}
  .screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.14em;color:var(--accent);text-shadow:var(--glow);line-height:1;margin-bottom:6px}
  .logo span{color:var(--accent2)}
  .tagline{font-size:.75rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:40px}
  .card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:32px 28px;display:flex;flex-direction:column;gap:16px}
  label{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  input[type=text]{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:16px 18px;color:var(--text);font-family:'Outfit',sans-serif;font-size:1.15rem;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,204,.12)}
  input[type=text]::placeholder{color:var(--muted)}
  .join-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent2),#c82896);color:#fff;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.16em;cursor:pointer;box-shadow:0 0 24px rgba(255,60,172,.3),0 4px 20px rgba(0,0,0,.4);transition:transform .12s,opacity .12s;-webkit-tap-highlight-color:transparent}
  .join-btn:active{transform:scale(.96);opacity:.85}
  .join-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .status{min-height:24px;font-size:.85rem;text-align:center;transition:opacity .2s}
  .status.error{color:var(--accent2)}.status.success{color:var(--accent)}.status.hidden{opacity:0}
  .success-screen{display:none;flex-direction:column;align-items:center;gap:16px;text-align:center}
  .success-screen.show{display:flex}.form-area.hide{display:none}
  .checkmark{font-size:4rem;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .success-name{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--accent);text-shadow:var(--glow);letter-spacing:.1em}
  .success-msg{color:var(--muted);font-size:.9rem;max-width:280px;line-height:1.5}
  .offline-banner{background:rgba(255,60,172,.12);border:1px solid rgba(255,60,172,.3);border-radius:8px;padding:8px 12px;font-size:.75rem;color:var(--accent2);text-align:center;display:none}
  .offline-banner.show{display:block}
</style>
</head>
<body>
<div class="screen">
  <div class="logo">SPIN<span>&</span>WIN</div>
  <div class="tagline">globalAI Berlin</div>
  <div class="card">
    <div class="offline-banner" id="offlineBanner">&#9888; Offline mode — names won't sync to the presenter screen</div>
    <div class="form-area" id="formArea">
      <label for="nameField">Your name</label>
      <input type="text" id="nameField" placeholder="e.g. Alex" maxlength="40" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="join-btn" id="joinBtn">JOIN THE WHEEL</button>
      <div class="status hidden" id="status"></div>
    </div>
    <div class="success-screen" id="successScreen">
      <div class="checkmark">&#127919;</div>
      <div class="success-name" id="successName"></div>
      <div class="success-msg">You're in the queue! The presenter will add you to the wheel shortly. Good luck &#127808;</div>
    </div>
  </div>
</div>

<script type="module">
// ── FIREBASE CONFIG ───────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB5LE5DyEiJdWTURf1P-MaU_ACFF_djF_4",
  authDomain:        "wheel-db5e9.firebaseapp.com",
  databaseURL:       "https://wheel-db5e9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "wheel-db5e9",
  storageBucket:     "wheel-db5e9.firebasestorage.app",
  messagingSenderId: "824688985151",
  appId:             "1:824688985151:web:75e50071b46950a6bca48a"
};

// ── DOM ───────────────────────────────────────────────────────────────────
const nameField     = document.getElementById('nameField');
const joinBtn       = document.getElementById('joinBtn');
const statusEl      = document.getElementById('status');
const formArea      = document.getElementById('formArea');
const successScreen = document.getElementById('successScreen');
const successName   = document.getElementById('successName');
const offlineBanner = document.getElementById('offlineBanner');

function setStatus(msg, type) { statusEl.textContent = msg; statusEl.className = `status ${type}`; }
function clearStatus()        { statusEl.className = 'status hidden'; }

// ── FIREBASE INIT (with offline fallback) ────────────────────────────────
let db = null;
let firebaseReady = false;

async function initFirebase() {
  try {
    const { initializeApp }        = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const { getDatabase, ref, get, push, query, orderByChild, equalTo }
                                   = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    const app = initializeApp(FIREBASE_CONFIG);
    db = getDatabase(app);
    firebaseReady = true;

    // Expose helpers on db object for use in joinHandler
    db._ref   = ref;
    db._get   = get;
    db._push  = push;
    db._query = query;
    db._orderByChild = orderByChild;
    db._equalTo      = equalTo;
  } catch (err) {
    console.warn('Firebase unavailable, running offline:', err.message);
    offlineBanner.classList.add('show');
  }
}

// ── JOIN HANDLER ──────────────────────────────────────────────────────────
async function handleJoin() {
  const name = nameField.value.trim();
  if (!name) { setStatus('Please enter your name.', 'error'); return; }

  joinBtn.disabled = true;
  clearStatus();

  if (!firebaseReady) {
    // Offline: just show success (name won't reach presenter)
    successName.textContent = name;
    formArea.classList.add('hide');
    successScreen.classList.add('show');
    return;
  }

  try {
    const { _ref, _get, _push, _query, _orderByChild, _equalTo } = db;

    // Dedup check: scan queue + wheel for this name (case-insensitive)
    const nameLower = name.toLowerCase();
    const [queueSnap, wheelSnap] = await Promise.all([
      _get(_ref(db, 'queue')),
      _get(_ref(db, 'wheel')),
    ]);

    const taken = (snap) => {
      if (!snap.exists()) return false;
      return Object.values(snap.val()).some(e => e.name?.toLowerCase() === nameLower);
    };

    if (taken(queueSnap) || taken(wheelSnap)) {
      setStatus('That name is already on the wheel or in the queue.', 'error');
      joinBtn.disabled = false;
      return;
    }

    // Write to queue
    await _push(_ref(db, 'queue'), { name, ts: Date.now() });

    successName.textContent = name;
    formArea.classList.add('hide');
    successScreen.classList.add('show');
  } catch (err) {
    console.error(err);
    setStatus('Could not reach Firebase. Check your connection.', 'error');
    joinBtn.disabled = false;
  }
}

joinBtn.addEventListener('click', handleJoin);
nameField.addEventListener('keydown', e => { if (e.key === 'Enter') handleJoin(); });
nameField.addEventListener('input', clearStatus);

// Boot
initFirebase().then(() => nameField.focus());
</script>
</body>
</html>
